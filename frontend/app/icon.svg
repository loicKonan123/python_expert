<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1B2540"/>
      <stop offset="100%" stop-color="#0B1326"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="60%" stop-color="#98CBFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#98CBFF" stop-opacity="0.65"/>
    </radialGradient>
  </defs>

  <!-- Fond rond aux couleurs Polaris -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- 4 petites branches diagonales -->
  <g fill="#98CBFF" opacity="0.55" transform="rotate(45 16 16)">
    <polygon points="16,5 17.1,16 16,27 14.9,16"/>
    <polygon points="5,16 16,14.9 27,16 16,17.1"/>
  </g>

  <!-- 4 grandes branches cardinales -->
  <g fill="#98CBFF">
    <polygon points="16,3 17.7,16 16,29 14.3,16"/>
    <polygon points="3,16 16,14.3 29,16 16,17.7"/>
  </g>

  <!-- Cœur lumineux -->
  <circle cx="16" cy="16" r="2.4" fill="url(#core)"/>
</svg>
